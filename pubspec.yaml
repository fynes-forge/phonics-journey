name: phonics_journey
description: A privacy-first, offline phonics app aligned to Little Wandle Letters and Sounds Revised.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Storage - offline only, no cloud
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Audio / TTS
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0

  # Navigation
  go_router: ^14.2.0

  # UI helpers
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.3
  uuid: ^4.4.0
  equatable: ^2.0.5
  get_it: ^7.7.0
  shared_preferences: ^2.2.3

  # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  record: ^6.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/
    - assets/audio/sfx/
    - assets/audio/phonemes/
    - assets/audio/words/
    - curriculum.json

  fonts:
    - family: Andika
      fonts:
        - asset: assets/fonts/Andika-Regular.ttf
          weight: 400
        - asset: assets/fonts/Andika-Bold.ttf
          weight: 700
        - asset: assets/fonts/Andika-Italic.ttf
          style: italic
