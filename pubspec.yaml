name: phonics_journey
description: A privacy-first, offline phonics app aligned to Little Wandle Letters and Sounds Revised.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Storage - offline only, no cloud
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.2 # Minor patch update

  # Audio / TTS
  flutter_tts: ^4.1.1 # Safe update
  audioplayers: ^6.1.0 # Minor feature update

  # Navigation
  # STAYING ON v14 - v15+ introduces breaking changes to ShellRoutes and redirects
  go_router: ^14.8.1

  # UI helpers
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.5 # Recommended for Pixel 10 / Android 14+ compatibility
  uuid: ^4.5.1
  equatable: ^2.0.5
  get_it: ^7.7.0
  shared_preferences: ^2.3.5 # Safe update

  # State management
  # STAYING ON v8 - v9 introduces 'onProgress' and change in BlocObserver syntax
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  record: ^6.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: 2.4.13 # Safe update for faster code generation
  flutter_lints: ^3.0.2
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/images/
    - assets/audio/sfx/
    - assets/audio/phonemes/
    - assets/audio/words/
    - curriculum.json

  fonts:
    - family: Andika
      fonts:
        - asset: assets/fonts/Andika-Regular.ttf
          weight: 400
        - asset: assets/fonts/Andika-Bold.ttf
          weight: 700
        - asset: assets/fonts/Andika-Italic.ttf
          style: italic

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/phonics_journey_logo.png"
  adaptive_icon_background: "#1A1B2E"
  adaptive_icon_foreground: "assets/images/phonics_journey_logo.png"
