<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- App icon background gradient - deep space -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E2A"/>
      <stop offset="50%" style="stop-color:#1A1040"/>
      <stop offset="100%" style="stop-color:#0D1B3E"/>
    </linearGradient>

    <!-- Planet gradient - blue-steel -->
    <radialGradient id="planetGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" style="stop-color:#83AFDF"/>
      <stop offset="45%" style="stop-color:#4F6272"/>
      <stop offset="100%" style="stop-color:#1A2535"/>
    </radialGradient>

    <!-- Planet atmosphere glow -->
    <radialGradient id="atmosphereGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" style="stop-color:#63C5EA;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#63C5EA;stop-opacity:0.25"/>
    </radialGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ECDA90;stop-opacity:0.1"/>
      <stop offset="20%" style="stop-color:#ECDA90;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#ECDA90"/>
      <stop offset="80%" style="stop-color:#ECDA90;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ECDA90;stop-opacity:0.1"/>
    </linearGradient>

    <!-- Rocket body gradient -->
    <linearGradient id="rocketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4E4F7"/>
      <stop offset="100%" style="stop-color:#B7C3F3"/>
    </linearGradient>

    <!-- Rocket nose gradient -->
    <linearGradient id="noseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DD7596"/>
      <stop offset="100%" style="stop-color:#9F3060"/>
    </linearGradient>

    <!-- Exhaust flame gradient -->
    <radialGradient id="flameGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="20%" style="stop-color:#ECDA90"/>
      <stop offset="60%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:0"/>
    </radialGradient>

    <!-- Letter tile gradient -->
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D4A6B"/>
      <stop offset="100%" style="stop-color:#1A2E45"/>
    </linearGradient>

    <!-- Glow filter for planet -->
    <filter id="planetGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for rocket exhaust -->
    <filter id="exhaustGlow" x="-100%" y="-20%" width="300%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer glow for whole icon -->
    <filter id="outerGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Star twinkle filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for rounded square icon shape -->
    <clipPath id="iconClip">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ─────────────────────────────────────────────────────── -->
  <g clip-path="url(#iconClip)">
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle noise texture overlay -->
    <rect width="1024" height="1024" fill="#9F7EBE" opacity="0.03"/>

    <!-- Deep space nebula hints -->
    <ellipse cx="200" cy="300" rx="280" ry="200" fill="#2D1B69" opacity="0.35"/>
    <ellipse cx="820" cy="700" rx="250" ry="180" fill="#1A3A6B" opacity="0.3"/>
    <ellipse cx="600" cy="150" rx="200" ry="150" fill="#0D2A5A" opacity="0.4"/>

    <!-- ── STARS ─────────────────────────────────────────────────────────── -->
    <!-- Large bright stars -->
    <circle cx="88"  cy="95"  r="2.5" fill="white" opacity="0.9" filter="url(#starGlow)"/>
    <circle cx="945" cy="112" r="3"   fill="white" opacity="0.85" filter="url(#starGlow)"/>
    <circle cx="156" cy="890" r="2.8" fill="white" opacity="0.8" filter="url(#starGlow)"/>
    <circle cx="920" cy="870" r="2.5" fill="white" opacity="0.9" filter="url(#starGlow)"/>
    <circle cx="68"  cy="560" r="2"   fill="white" opacity="0.75" filter="url(#starGlow)"/>
    <circle cx="975" cy="440" r="2.2" fill="white" opacity="0.8" filter="url(#starGlow)"/>

    <!-- Medium stars -->
    <circle cx="180" cy="180" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="840" cy="200" r="1.8" fill="white" opacity="0.65"/>
    <circle cx="120" cy="750" r="1.4" fill="white" opacity="0.6"/>
    <circle cx="900" cy="760" r="1.6" fill="white" opacity="0.7"/>
    <circle cx="300" cy="60"  r="1.5" fill="white" opacity="0.65"/>
    <circle cx="720" cy="55"  r="1.3" fill="white" opacity="0.6"/>
    <circle cx="50"  cy="320" r="1.4" fill="white" opacity="0.55"/>
    <circle cx="980" cy="300" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="200" cy="980" r="1.4" fill="white" opacity="0.5"/>
    <circle cx="800" cy="970" r="1.6" fill="white" opacity="0.55"/>
    <circle cx="440" cy="40"  r="1.3" fill="white" opacity="0.6"/>
    <circle cx="580" cy="980" r="1.4" fill="white" opacity="0.5"/>

    <!-- Small scattered stars -->
    <circle cx="260" cy="130" r="1"   fill="white" opacity="0.5"/>
    <circle cx="780" cy="140" r="0.9" fill="white" opacity="0.45"/>
    <circle cx="350" cy="900" r="1"   fill="white" opacity="0.45"/>
    <circle cx="680" cy="910" r="0.9" fill="white" opacity="0.4"/>
    <circle cx="100" cy="430" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="940" cy="530" r="1"   fill="white" opacity="0.45"/>
    <circle cx="55"  cy="680" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="995" cy="650" r="0.9" fill="white" opacity="0.4"/>
    <circle cx="490" cy="970" r="0.8" fill="white" opacity="0.4"/>
    <circle cx="530" cy="50"  r="0.9" fill="white" opacity="0.45"/>

    <!-- Coloured accent stars (lavender/cyan tints) -->
    <circle cx="750" cy="90"  r="1.8" fill="#B7C3F3" opacity="0.7" filter="url(#starGlow)"/>
    <circle cx="130" cy="650" r="1.5" fill="#63C5EA" opacity="0.6" filter="url(#starGlow)"/>
    <circle cx="890" cy="400" r="1.6" fill="#B7C3F3" opacity="0.65" filter="url(#starGlow)"/>
    <circle cx="330" cy="960" r="1.4" fill="#ECDA90" opacity="0.6" filter="url(#starGlow)"/>
    <circle cx="670" cy="30"  r="1.5" fill="#ECDA90" opacity="0.65" filter="url(#starGlow)"/>

    <!-- ── WINDING PATH (level map reference) ────────────────────────────── -->
    <!-- Subtle dotted path hinting at the planet map -->
    <path d="M 160 820 Q 100 680 200 580 Q 300 480 420 520 Q 540 560 580 450 Q 620 340 520 260"
          stroke="#4F6272" stroke-width="3" stroke-dasharray="8 12"
          fill="none" opacity="0.35"/>

    <!-- ── LEVEL NODE PLANETS (small, on the path) ───────────────────────── -->
    <!-- Node 1 - pink (current level style) -->
    <circle cx="185" cy="788" r="22" fill="#2A1A35" opacity="0.9"/>
    <circle cx="185" cy="788" r="18" fill="#DD7596"/>
    <circle cx="185" cy="788" r="24" fill="none" stroke="#DD7596" stroke-width="2" opacity="0.5"/>
    <text x="185" y="795" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="white">1</text>

    <!-- Node 2 - cyan -->
    <circle cx="416" cy="522" r="18" fill="#2A1A35" opacity="0.9"/>
    <circle cx="416" cy="522" r="14" fill="#63C5EA"/>
    <circle cx="416" cy="522" r="20" fill="none" stroke="#63C5EA" stroke-width="1.5" opacity="0.4"/>
    <text x="416" y="528" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">2</text>

    <!-- Node 3 - gold (completed, with star) -->
    <circle cx="524" cy="256" r="16" fill="#2A1A35" opacity="0.9"/>
    <circle cx="524" cy="256" r="12" fill="#ECDA90"/>
    <text x="524" y="262" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white">★</text>

    <!-- ── MAIN PLANET ─────────────────────────────────────────────────────── -->
    <!-- Atmosphere glow ring (outermost) -->
    <circle cx="560" cy="530" r="230" fill="url(#atmosphereGrad)"/>

    <!-- Planet shadow arc for depth -->
    <circle cx="560" cy="530" r="195" fill="#0A1520" opacity="0.3"
            transform="translate(25, 20)"/>

    <!-- Main planet body -->
    <circle cx="560" cy="530" r="195" fill="url(#planetGrad)" filter="url(#planetGlow)"/>

    <!-- Planet surface detail - subtle continent shapes -->
    <ellipse cx="510" cy="480" rx="80" ry="55" fill="#5A7A9A" opacity="0.25" transform="rotate(-20 510 480)"/>
    <ellipse cx="620" cy="580" rx="65" ry="40" fill="#3D5A75" opacity="0.2" transform="rotate(15 620 580)"/>
    <ellipse cx="480" cy="590" rx="50" ry="35" fill="#6A8FAF" opacity="0.15" transform="rotate(-35 480 590)"/>

    <!-- Planet highlight (specular) -->
    <ellipse cx="490" cy="440" rx="75" ry="50" fill="white" opacity="0.08" transform="rotate(-25 490 440)"/>
    <ellipse cx="475" cy="425" rx="35" ry="22" fill="white" opacity="0.12" transform="rotate(-25 475 425)"/>

    <!-- Planet ring - back half (behind planet) -->
    <ellipse cx="560" cy="560" rx="295" ry="72"
             stroke="url(#ringGrad)" stroke-width="14" fill="none" opacity="0.35"
             transform="rotate(-18 560 560)"/>
    <!-- Clip the front of the ring behind planet -->
    <clipPath id="ringBackClip">
      <rect x="265" y="488" width="590" height="144" transform="rotate(-18 560 560)"/>
    </clipPath>

    <!-- Planet ring - full visible arc (in front) -->
    <ellipse cx="560" cy="560" rx="295" ry="72"
             stroke="url(#ringGrad)" stroke-width="14" fill="none"
             transform="rotate(-18 560 560)"
             stroke-dasharray="460 480"
             stroke-dashoffset="0"/>

    <!-- Ring shadow on planet -->
    <ellipse cx="560" cy="490" rx="200" ry="18" fill="#0A0E2A" opacity="0.2"
             transform="rotate(-18 560 490)"/>

    <!-- ── ROCKET ──────────────────────────────────────────────────────────── -->
    <!-- Positioned top-right, angled 40 degrees, launching away -->
    <g transform="translate(730, 195) rotate(40)">
      <!-- Exhaust flame (drawn first, behind rocket) -->
      <g filter="url(#exhaustGlow)">
        <!-- Outer flame -->
        <ellipse cx="0" cy="92" rx="22" ry="38" fill="url(#flameGrad)" opacity="0.7"/>
        <!-- Inner hot core -->
        <ellipse cx="0" cy="84" rx="11" ry="22" fill="#FFFFFF" opacity="0.9"/>
        <!-- Flame wisps -->
        <ellipse cx="-12" cy="105" rx="8" ry="18" fill="#FF8C42" opacity="0.5" transform="rotate(-15 -12 105)"/>
        <ellipse cx="12"  cy="105" rx="8" ry="18" fill="#ECDA90" opacity="0.5" transform="rotate(15 12 105)"/>
      </g>

      <!-- Rocket body -->
      <rect x="-28" y="20" width="56" height="62" rx="8" fill="url(#rocketGrad)"/>

      <!-- Nose cone -->
      <path d="M -28 20 Q 0 -50 28 20 Z" fill="url(#noseGrad)"/>

      <!-- Window -->
      <circle cx="0" cy="40" r="16" fill="#0A1525"/>
      <circle cx="0" cy="40" r="13" fill="#63C5EA" opacity="0.9"/>
      <!-- Window highlight -->
      <circle cx="-4" cy="35" r="5" fill="white" opacity="0.4"/>

      <!-- Body stripe -->
      <rect x="-28" y="58" width="56" height="8" rx="2" fill="#9F7EBE" opacity="0.6"/>

      <!-- Left fin -->
      <path d="M -28 68 L -52 95 L -28 82 Z" fill="#DD7596"/>
      <!-- Right fin -->
      <path d="M 28 68 L 52 95 L 28 82 Z" fill="#DD7596"/>

      <!-- Engine nozzle -->
      <rect x="-16" y="82" width="32" height="14" rx="3" fill="#3A4A5C"/>
      <rect x="-12" y="88" width="24" height="8" rx="2" fill="#252E36"/>
    </g>

    <!-- ── LETTER TILES ────────────────────────────────────────────────────── -->
    <!-- Three floating letter tiles suggesting the spelling game -->
    <!-- Tile S -->
    <g transform="translate(95, 370)">
      <rect x="0" y="0" width="88" height="94" rx="16"
            fill="url(#tileGrad)"
            stroke="#4F6272" stroke-width="2"/>
      <!-- Subtle inner highlight -->
      <rect x="2" y="2" width="84" height="45" rx="14"
            fill="white" opacity="0.04"/>
      <text x="44" y="67" text-anchor="middle"
            font-family="Georgia, serif" font-size="58" font-weight="bold"
            fill="#B7C3F3" opacity="0.95">s</text>
    </g>

    <!-- Tile A -->
    <g transform="translate(100, 490)" opacity="0.8">
      <rect x="0" y="0" width="80" height="86" rx="14"
            fill="url(#tileGrad)"
            stroke="#4F6272" stroke-width="1.5"/>
      <rect x="2" y="2" width="76" height="40" rx="12"
            fill="white" opacity="0.04"/>
      <text x="40" y="62" text-anchor="middle"
            font-family="Georgia, serif" font-size="52" font-weight="bold"
            fill="#ECDA90" opacity="0.9">a</text>
    </g>

    <!-- Tile T -->
    <g transform="translate(110, 596)" opacity="0.65">
      <rect x="0" y="0" width="72" height="78" rx="13"
            fill="url(#tileGrad)"
            stroke="#4F6272" stroke-width="1.5"/>
      <text x="36" y="57" text-anchor="middle"
            font-family="Georgia, serif" font-size="46" font-weight="bold"
            fill="#63C5EA" opacity="0.85">t</text>
    </g>

    <!-- ── STARS EARNED (3-star display) ──────────────────────────────────── -->
    <!-- Three gold stars bottom-right, suggesting achievement -->
    <g transform="translate(688, 730)">
      <!-- Star 1 -->
      <polygon points="28,4 34,20 52,20 38,30 43,46 28,36 13,46 18,30 4,20 22,20"
               fill="#ECDA90" filter="url(#starGlow)"/>
      <!-- Star 2 -->
      <polygon points="78,4 84,20 102,20 88,30 93,46 78,36 63,46 68,30 54,20 72,20"
               fill="#ECDA90" filter="url(#starGlow)"/>
      <!-- Star 3 -->
      <polygon points="128,4 134,20 152,20 138,30 143,46 128,36 113,46 118,30 104,20 122,20"
               fill="#ECDA90" filter="url(#starGlow)"/>
    </g>

    <!-- ── BOTTOM WORDMARK ─────────────────────────────────────────────────── -->
    <!-- Subtle bottom panel -->
    <rect x="0" y="820" width="1024" height="204" fill="#060912" opacity="0.75"/>
    <rect x="0" y="820" width="1024" height="2" fill="#ECDA90" opacity="0.3"/>

    <!-- App name -->
    <text x="512" y="904"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="96"
          font-weight="bold"
          letter-spacing="8"
          fill="#F0F4FF">PHONICS</text>

    <text x="512" y="975"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="52"
          font-weight="normal"
          letter-spacing="22"
          fill="#ECDA90">JOURNEY</text>

    <!-- Decorative line under wordmark -->
    <line x1="180" y1="995" x2="844" y2="995" stroke="#4F6272" stroke-width="1" opacity="0.5"/>

    <!-- ── CORNER BRAND MARKS (Fynes Forge signature) ──────────────────────── -->
    <!-- Top-left gold ticks -->
    <rect x="28" y="28" width="36" height="5" rx="2" fill="#ECDA90" opacity="0.7"/>
    <rect x="28" y="28" width="5" height="36" rx="2" fill="#ECDA90" opacity="0.7"/>

    <!-- Bottom-right pink ticks -->
    <rect x="960" y="991" width="36" height="5" rx="2" fill="#DD7596" opacity="0.7"/>
    <rect x="991" y="960" width="5" height="36" rx="2" fill="#DD7596" opacity="0.7"/>

    <!-- Top-right clipped corner triangle -->
    <polygon points="934,28 996,28 996,90" fill="#DD7596" opacity="0.6"/>
  </g>
</svg>
